requirements_gathering:
  description: >
    为 {project_name} 收集和分析需求。
    与利益相关者进行访谈，分析用户需求，并记录功能需求。
    创建用户故事和验收标准。
  expected_output: >
    一份全面的需求文档，包含用户故事、验收标准和用例。
  agent: requirements_analyst

ui_design:
  description: >
    为 {project_name} 设计用户界面模型和交互原型。
    创建线框图、高保真设计稿和设计规范文档。
    确保设计遵循无障碍指南。
  expected_output: >
    UI 模型、设计规范和展示用户流程的原型。
  agent: ui_designer

development:
  description: >
    根据需求和设计规范实现 {project_name}。
    编写简洁、有测试且有文档的代码，遵循最佳实践。
    设置 CI/CD 流水线，确保代码质量。
  expected_output: >
    可运行的软件，包含单元测试、代码文档和 CI/CD 配置。
  agent: software_developer

testing:
  description: >
    为 {project_name} 创建并执行全面的测试计划。
    执行功能测试、集成测试和回归测试。
    记录测试结果并跟踪缺陷直至解决。
  expected_output: >
    测试计划、测试用例、测试执行报告和缺陷跟踪文档。
  agent: qa_engineer

documentation:
  description: >
    为 {project_name} 创建全面的文档，包括：
    - 用户指南和教程
    - API 文档（如适用）
    - 部署和配置指南
    - 故障排除 FAQ
  expected_output: >
    完整的用户文档和开发者指南，使用 Markdown 格式。
  agent: technical_writer

product_review:
  description: >
    审查 {project_name} 所有团队成员的交付成果。
    确保与原始愿景、质量标准和业务目标保持一致。
    提供最终建议和签署意见。
  expected_output: >
    一份产品评审报告，包含评估意见和上线/不上线建议。
  agent: product_manager
